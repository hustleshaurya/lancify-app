<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lancify — Sign in</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      font-family: 'Inter', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-card {
      background: #0a0a0a;
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 2rem;
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 1.8rem;
      color: #fff;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      margin-bottom: 0.5rem;
    }
    .subhead {
      color: #a1a1aa;
      margin-bottom: 2rem;
      display: block;
    }
    .google-btn {
      width: 100%;
      background: #111;
      border: 1px solid #27272a;
      border-radius: 60px;
      padding: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 1rem;
      color: white;
      cursor: pointer;
    }
    .google-btn:hover { border-color: #a855f7; }
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.8rem 0;
      color: #3f3f46;
    }
    .divider-line { flex: 1; height: 1px; background: #27272a; }
    .input-group { margin-bottom: 1.2rem; text-align: left; }
    .input-group label { display: block; font-size: 0.8rem; margin-bottom: 0.4rem; color: #d4d4d8; }
    .input-group input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #27272a;
      border-radius: 60px;
      padding: 0.8rem 1.2rem;
      color: white;
    }
    .input-group input:focus { outline: none; border-color: #a855f7; }
    .email-btn {
      width: 100%;
      background: #a855f7;
      border: none;
      border-radius: 60px;
      padding: 0.85rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
    }
    .email-btn:hover { background: #9333ea; }
    .footer-note { font-size: 0.75rem; color: #52525b; margin-top: 2rem; }
    .error-message {
      background: rgba(220,38,38,0.1);
      border: 1px solid #ef4444;
      border-radius: 60px;
      padding: 0.6rem;
      font-size: 0.8rem;
      margin-top: 1rem;
      color: #f87171;
      display: none;
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <path d="M20 0L24.5 15.5L40 20L24.5 24.5L20 40L15.5 24.5L0 20L15.5 15.5L20 0Z" fill="url(#gradient)"/>
      <defs><linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient></defs>
    </svg>
    <span class="logo-text">Lanc<span style="color:#a855f7;">ify</span></span>
  </div>
  <h1>Start your freelance journey</h1>
  <span class="subhead">Sign in to access your AI launch kit</span>

  <button id="googleBtn" class="google-btn">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign in with Google
  </button>

  <div class="divider"><div class="divider-line"></div><span>or</span><div class="divider-line"></div></div>

  <div class="input-group"><label>Email</label><input type="email" id="emailInput" placeholder="you@college.com"></div>
  <div class="input-group"><label>Password</label><input type="password" id="passwordInput" placeholder="••••••••"></div>
  <button id="emailBtn" class="email-btn">Sign in with email</button>

  <div id="errorMsg" class="error-message"></div>
  <div class="footer-note">By continuing you agree to Lancify's Terms</div>
</div>

<script>
  // CORRECTED Supabase URL
  const SUPABASE_URL = 'https://qkpyqtynwbvjssrqanmk.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrcHlxdHlud2J2anNzcnFhbm1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzEzNjksImV4cCI6MjA5MDQ0NzM2OX0.INAaApS6CqlzeOmRq-Yux3QkzDt4etQrklSnmX9droY';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showError(msg) {
    const errDiv = document.getElementById('errorMsg');
    errDiv.textContent = msg;
    errDiv.style.display = 'block';
    setTimeout(() => errDiv.style.display = 'none', 5000);
  }

  // Google Sign In
  document.getElementById('googleBtn').onclick = async () => {
    try {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://lancify-app.vercel.app/app' }
      });
      if (error) throw error;
    } catch (err) {
      showError(err.message);
    }
  };

  // Email Sign In / Sign Up
  document.getElementById('emailBtn').onclick = async () => {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    if (!email || !password) {
      showError('Enter email and password');
      return;
    }
    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      localStorage.setItem('lancify_session', data.session.access_token);
      window.location.href = '/app';
    } catch (err) {
      if (err.message.includes('Invalid login')) {
        const { error: signUpError } = await supabase.auth.signUp({ email, password });
        if (signUpError) showError(signUpError.message);
        else showError('Account created! Check your email to confirm.');
      } else {
        showError(err.message);
      }
    }
  };

  // Auto redirect if already logged in
  if (localStorage.getItem('lancify_session')) {
    window.location.href = '/app';
  }
</script>
</body>
</html>
