<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lancify — Sign in to continue</title>
  <!-- Google Fonts: Playfair Display + modern sans for UI -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Supabase JS library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      isolation: isolate;
    }

    /* subtle noise texture */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 480px;
      width: 100%;
      z-index: 2;
    }

    /* card */
    .login-card {
      background: #0a0a0a;
      border: 1px solid rgba(168, 85, 247, 0.2);
      border-radius: 2rem;
      padding: 2.5rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(168, 85, 247, 0.05);
      backdrop-filter: blur(2px);
    }

    /* logo area */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .logo-icon {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.4rem;
      font-family: 'Playfair Display', serif;
      color: white;
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #ffffff, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .subhead {
      text-align: center;
      color: #a1a1aa;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(168,85,247,0.2);
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      padding-bottom: 0.75rem;
    }

    .google-btn {
      width: 100%;
      background: #111111;
      border: 1px solid #27272a;
      border-radius: 60px;
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 1rem;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    .google-btn:hover {
      background: #1a1a1a;
      border-color: #a855f7;
      transform: scale(0.98);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.8rem 0;
      color: #3f3f46;
      font-size: 0.8rem;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: #27272a;
    }
    .input-group {
      margin-bottom: 1.2rem;
    }
    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: #d4d4d8;
    }
    .input-group input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #27272a;
      border-radius: 60px;
      padding: 0.8rem 1.2rem;
      color: white;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #a855f7;
      box-shadow: 0 0 0 2px rgba(168,85,247,0.2);
    }
    .email-btn {
      width: 100%;
      background: #a855f7;
      border: none;
      border-radius: 60px;
      padding: 0.85rem;
      font-weight: 600;
      color: white;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
    }
    .email-btn:hover {
      background: #9333ea;
      transform: scale(0.98);
    }
    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: #52525b;
      margin-top: 2rem;
    }
    .error-message {
      background: rgba(220,38,38,0.1);
      border: 1px solid #ef4444;
      border-radius: 60px;
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 1rem;
      color: #f87171;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      font-family: 'Playfair Display', serif;
      flex-direction: column;
      gap: 1rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #27272a;
      border-top: 3px solid #a855f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">L</div>
      <div class="logo-text">Lancify</div>
    </div>
    <h1>Start your freelance journey</h1>
    <div style="text-align: center; margin-bottom: 1.5rem;">
      <span class="subhead">Sign in to access your AI launch kit</span>
    </div>

    <!-- Google Sign In -->
    <button id="googleSignInBtn" class="google-btn">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#ffffff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
        <path fill="#ffffff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
        <path fill="#ffffff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
        <path fill="#ffffff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
      </svg>
      Sign in with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span>or continue with email</span>
      <div class="divider-line"></div>
    </div>

    <!-- Email sign in -->
    <div class="input-group">
      <label>Email address</label>
      <input type="email" id="emailInput" placeholder="you@college.com">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••">
    </div>
    <button id="emailSignInBtn" class="email-btn">Sign in with email</button>

    <div id="errorMsg" class="error-message" style="display: none;"></div>
    <div class="footer-note">
      By continuing you agree to Lancify's Terms of Service.
    </div>
  </div>
</div>

<script>
  // ---------- SUPABASE CONFIG ----------
  // Use YOUR actual Supabase URL and anon key
  const SUPABASE_URL = 'https://qkpyqtynwbvjsrsqanmk.supabase.co';  // ✅ Replace if different
  const SUPABASE_ANON_KEY = 'sb_pub1ishable_0100V1HvN3mrfZgTpCJfg_4yFEC...'; // ❌ REPLACE with your actual anon key from Supabase (Settings → API)

  // Initialize Supabase client
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Helper to show error
  function showError(message) {
    const errDiv = document.getElementById('errorMsg');
    errDiv.textContent = message;
    errDiv.style.display = 'block';
    setTimeout(() => { errDiv.style.display = 'none'; }, 4000);
  }

  // After login success: store session & redirect to AI app
  async function onAuthSuccess(session) {
    if (session?.access_token) {
      localStorage.setItem('lancify_session', session.access_token);
      window.location.href = '/app';
    } else {
      showError('Login succeeded but missing token. Please try again.');
    }
  }

  // Google Sign-In
  document.getElementById('googleSignInBtn').addEventListener('click', async () => {
    try {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin }
      });
      if (error) throw error;
      // After redirect, we'll be back on same page. We'll check session on load.
    } catch (err) {
      showError(err.message);
    }
  });

  // Email sign in
  document.getElementById('emailSignInBtn').addEventListener('click', async () => {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    if (!email || !password) {
      showError('Please enter email and password');
      return;
    }
    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      await onAuthSuccess(data.session);
    } catch (err) {
      // If user doesn't exist, sign them up automatically
      if (err.message.includes('Invalid login credentials')) {
        try {
          const { data, error: signUpError } = await supabase.auth.signUp({ email, password });
          if (signUpError) throw signUpError;
          showError('Account created! Please check your email to confirm (or sign in again).');
        } catch (signUpErr) {
          showError(signUpErr.message);
        }
      } else {
        showError(err.message);
      }
    }
  });

  // On page load: if already have session, redirect to app
  async function checkExistingSession() {
    const storedToken = localStorage.getItem('lancify_session');
    if (storedToken) {
      // Optional: verify token with backend
      window.location.href = '/app';
    }
  }
  checkExistingSession();
</script>
</body>
</html>
